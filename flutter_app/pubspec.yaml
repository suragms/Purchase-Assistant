name: harisree_warehouse
description: Harisree Warehouse — stock, purchase & delivery management
publish_to: "none"
version: 0.1.4+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  fl_chart: ^0.69.0
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  connectivity_plus: ^6.1.0
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  http_parser: ^4.1.2
  flutter_slidable: ^3.1.1
  pdf: ^3.11.1
  printing: ^5.13.4
  shimmer: ^3.0.0
  image: ^4.3.0
  quick_actions: ^1.1.0
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  barcode: ^2.2.9
  flutter_svg: ^2.0.17
  local_auth: ^2.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_foreground: assets/images/app_logo.png
  adaptive_icon_background: "#14523E"

flutter:
  uses-material-design: true
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
          weight: 400
  assets:
    - assets/images/app_logo.webp
    - assets/brand/logo.webp
    - assets/brand/getstarted_bg.webp
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSansMalayalam-Regular.ttf
    - assets/config/unit_rules_master.json
