# Optional: ping Supabase REST so free-tier projects stay warm.
# Repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (Dashboard → Settings → API).
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET Supabase REST (service role)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Skip: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set."
            exit 0
          fi
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
          echo "HTTP $code"
          if [ "$code" != "200" ] && [ "$code" != "204" ]; then
            echo "::warning::Supabase REST ping returned $code"
            exit 1
          fi
