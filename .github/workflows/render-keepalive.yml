# Keeps Render API warm and surfaces outages early (workflow_dispatch for manual ping).
name: Render API keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /health/ready
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/ready.json -w "%{http_code}" \
            --max-time 30 "https://my-purchases-api.onrender.com/health/ready")
          echo "HTTP $code"
          cat /tmp/ready.json
          if [ "$code" != "200" ]; then
            echo "::warning::Render /health/ready returned $code"
            exit 1
          fi
