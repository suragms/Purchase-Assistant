# Keeps Render API warm and surfaces outages early (workflow_dispatch for manual ping).
name: Render API keep-alive

on:
  schedule:
    - cron: "*/9 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /health
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
            --max-time 30 "https://my-purchases-api.onrender.com/health")
          echo "HTTP $code"
          cat /tmp/health.json
          test "$code" = "200"
      - name: GET /health/ready
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/ready.json -w "%{http_code}" \
            --max-time 30 "https://my-purchases-api.onrender.com/health/ready")
          echo "HTTP $code"
          cat /tmp/ready.json
          test "$code" = "200"
