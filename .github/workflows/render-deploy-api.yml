# Trigger Render deploy when backend changes land on main.
# Required GitHub repo secret: RENDER_API_KEY (Dashboard → Account → API Keys)
# Service id is public (not a secret): srv-d7ea0il8nd3s73e4fvl0 = my-purchases-api
name: Deploy API (Render)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/render-deploy-api.yml'
  workflow_dispatch:

env:
  RENDER_SERVICE_ID: srv-d7ea0il8nd3s73e4fvl0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::warning::RENDER_API_KEY secret missing — skip API deploy."
            echo "Enable Auto-Deploy in Render Dashboard OR add RENDER_API_KEY to GitHub secrets."
            exit 0
          fi
          resp=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          body=$(echo "$resp" | head -n -1)
          code=$(echo "$resp" | tail -n 1)
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Render deploy API returned HTTP $code"
            exit 1
          fi
          echo "Render deploy started (HTTP $code)."
